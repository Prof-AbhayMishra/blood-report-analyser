<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --white:#ffffff;--bg:#f6f7f9;--card:#ffffff;--border:#e8e9ed;--border-lt:#f0f1f4;
  --text:#1a1d26;--text2:#5e6378;--muted:#9398a8;
  --accent:#2563eb;--accent-bg:#eff4ff;
  --red:#dc2626;--red-bg:#fef2f2;--amber:#d97706;--amber-bg:#fffbeb;--green:#16a34a;--green-bg:#f0fdf4;
  --radius:10px;--shadow:0 2px 8px rgba(0,0,0,0.06);--shadow-lg:0 8px 30px rgba(0,0,0,0.10);
  --fd:'Source Serif 4',Georgia,serif;--fb:'Outfit',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}

.header{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header-left{display:flex;align-items:baseline;gap:12px}
.header-left h1{font-family:var(--fd);font-size:20px;font-weight:600;letter-spacing:-0.3px}
.header-left .ptag{font-size:13px;color:var(--text2);padding-left:12px;border-left:1.5px solid var(--border)}
.header-actions{display:flex;gap:8px}
.btn{font-family:var(--fb);font-size:13px;font-weight:500;padding:8px 16px;border-radius:7px;border:1px solid var(--border);background:var(--white);color:var(--text);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn:hover{background:var(--bg);border-color:#d0d3da}
.btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn-p:hover{background:#1d4ed8}
#fileInput{display:none}

.main{max-width:1440px;margin:0 auto;padding:24px 32px 48px}

.upload-zone{border:1.5px dashed #cbd5e1;border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:24px;cursor:pointer;transition:all .2s;background:var(--white)}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:var(--accent-bg)}
.upload-zone h3{font-size:15px;font-weight:500;margin-bottom:3px}
.upload-zone p{font-size:12px;color:var(--muted)}

.summary-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:12px;margin-bottom:24px}
.si{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;position:relative}
.si .bar{position:absolute;top:0;left:14px;right:14px;height:2.5px;border-radius:0 0 2px 2px}
.si .lb{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:500;margin-bottom:5px}
.si .vl{font-family:var(--fd);font-size:24px;font-weight:700;line-height:1.1}
.si .sb{font-size:11px;color:var(--muted);margin-top:2px}
.sc .vl{color:var(--red)}.sc .bar{background:var(--red)}
.sw .vl{color:var(--amber)}.sw .bar{background:var(--amber)}
.sg .vl{color:var(--green)}.sg .bar{background:var(--green)}
.sn .vl{color:var(--accent)}.sn .bar{background:var(--accent)}

.fbar{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:24px;display:flex;flex-wrap:wrap;align-items:center;gap:8px}
.fl{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);white-space:nowrap}
.fsep{width:1px;height:22px;background:var(--border);margin:0 4px}
.chips{display:flex;flex-wrap:wrap;gap:4px}
.chip{font-family:var(--fb);font-size:11px;font-weight:500;padding:4px 10px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:#c0c4d0}
.chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
.chipc.on{background:var(--text);border-color:var(--text);color:#fff}

.sh{font-family:var(--fd);font-size:17px;font-weight:600;margin:28px 0 14px;display:flex;align-items:center;gap:8px}
.sh::before{content:'';width:3px;height:18px;background:var(--accent);border-radius:2px}

.ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:12px;margin-bottom:8px}
.ins{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;transition:box-shadow .2s}
.ins:hover{box-shadow:var(--shadow)}
.itag{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:2px 7px;border-radius:4px;margin-bottom:6px}
.th{background:var(--red-bg);color:var(--red)}.tm{background:var(--amber-bg);color:var(--amber)}.tl{background:var(--green-bg);color:var(--green)}
.ins h4{font-size:13.5px;font-weight:600;margin-bottom:3px}
.ins p{font-size:12px;color:var(--text2);line-height:1.55}

.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(450px,1fr));gap:14px;margin-bottom:8px}
.cc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;transition:box-shadow .2s}
.cc:hover{box-shadow:var(--shadow)}
.ct{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.ct h4{font-size:13.5px;font-weight:600}
.ct .cs{font-size:11px;color:var(--muted)}
.ca{display:flex;gap:4px;align-items:center}
.cb{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px}
.cba{background:var(--red-bg);color:var(--red)}.cbo{background:var(--green-bg);color:var(--green)}
.mbtn{width:26px;height:26px;border-radius:5px;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--muted);transition:all .15s}
.mbtn:hover{background:var(--bg);color:var(--text)}
.cw{height:220px;position:relative}

/* MODAL */
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.3);backdrop-filter:blur(3px);z-index:500;align-items:center;justify-content:center;padding:20px}
.mo.open{display:flex}
.mm{background:var(--white);border-radius:14px;width:100%;max-width:1100px;box-shadow:var(--shadow-lg);overflow:hidden;display:flex;flex-direction:column}
.mh{padding:16px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.mh h3{font-family:var(--fd);font-size:18px;font-weight:600}
.mh .xb{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .15s}
.mh .xb:hover{background:var(--bg);color:var(--text)}
.mb{padding:20px 22px}
.mc{width:100%;height:420px}

/* TABLE */
.tc{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:8px}
.ttb{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ttb span{font-size:12px;color:var(--muted)}.ttb strong{color:var(--text)}
.tg{display:flex;border:1px solid var(--border);border-radius:6px;overflow:hidden}
.tg button{font-family:var(--fb);font-size:11px;font-weight:500;padding:4px 12px;border:none;background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s;border-right:1px solid var(--border)}
.tg button:last-child{border-right:none}
.tg button.on{background:var(--text);color:#fff}

.ts{overflow-x:auto;max-height:70vh;overflow-y:auto}
table{border-collapse:collapse;font-size:12.5px;width:max-content;min-width:100%}
thead th{padding:9px 13px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);background:#fafbfc;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap;position:sticky;top:0;z-index:10}
tbody td{padding:7px 13px;border-bottom:1px solid var(--border-lt);white-space:nowrap;position:relative}
tbody tr:hover td{background:#f8f9fb}

/* FROZEN COLS */
thead th:nth-child(1),tbody td:nth-child(1){position:sticky;left:0;z-index:12;min-width:160px;max-width:190px;overflow:hidden;text-overflow:ellipsis;background:var(--white)}
thead th:nth-child(2),tbody td:nth-child(2){position:sticky;left:160px;z-index:12;min-width:85px;background:var(--white)}
thead th:nth-child(1),thead th:nth-child(2){z-index:15;background:#fafbfc}
tbody td:nth-child(2)::after{content:'';position:absolute;top:0;bottom:0;right:-5px;width:5px;background:linear-gradient(90deg,rgba(0,0,0,0.035),transparent);pointer-events:none}
tbody tr:hover td:nth-child(1),tbody tr:hover td:nth-child(2){background:#f8f9fb}

.cr td{background:var(--accent-bg)!important;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);padding:7px 13px}
.vh{color:var(--red);font-weight:600}.vl{color:var(--amber);font-weight:600}.vo{color:var(--green)}.vn{color:#ccc}
.hc{display:inline-block;padding:2px 7px;border-radius:4px;font-size:12px;font-weight:500;min-width:48px;text-align:center}

.tl-wrap{padding-left:20px;position:relative;margin-bottom:24px}
.tl-wrap::before{content:'';position:absolute;left:5px;top:0;bottom:0;width:1.5px;background:var(--border)}
.ti{position:relative;margin-bottom:14px;padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px}
.ti::before{content:'';position:absolute;left:-20px;top:14px;width:8px;height:8px;border-radius:50%;background:var(--accent);border:2px solid var(--white);box-shadow:0 0 0 2px var(--accent)}
.td{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.tb{font-size:12px;color:var(--text2);margin-top:3px;line-height:1.5}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fu .3s ease both}

@media(max-width:1024px){.main{padding:16px}.header{padding:14px 16px}.cg{grid-template-columns:1fr}}
@media(max-width:768px){.header{flex-direction:column;align-items:flex-start;gap:10px}.summary-strip{grid-template-columns:repeat(2,1fr)}.ig,.cg{grid-template-columns:1fr}.fbar{flex-direction:column;align-items:flex-start}thead th:nth-child(1),tbody td:nth-child(1){min-width:120px}thead th:nth-child(2),tbody td:nth-child(2){left:120px}}
@media(max-width:480px){.summary-strip{grid-template-columns:1fr}}
@media print{.header,.upload-zone,.fbar,.mbtn{display:none}.cc{break-inside:avoid}body{background:#fff}}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#d0d3da;border-radius:3px}
</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <h1>Health Report</h1>

  </div>

<div class="mo" id="chartModal">

function pR(t){t=t.replace(/\s/g,'');if(t.startsWith('<='))return{lo:0,hi:parseFloat(t.replace('<=',''))};if(t.startsWith('>='))return{lo:parseFloat(t.replace('>=','')),hi:Infinity};if(t.includes('-')){const p=t.split('-');return{lo:parseFloat(p[0]),hi:parseFloat(p[1])};}return{lo:null,hi:null};}
function st(v,lo,hi){if(v===null||v===undefined||isNaN(v))return'na';if(lo!==null&&v<lo)return'low';if(hi!==null&&hi!==Infinity&&v>hi)return'high';return'ok';}

const uz=document.getElementById('uz');
uz.addEventListener('dragover',e=>{e.preventDefault();uz.classList.add('dragover');});
uz.addEventListener('dragleave',()=>uz.classList.remove('dragover'));
uz.addEventListener('drop',e=>{e.preventDefault();uz.classList.remove('dragover');if(e.dataTransfer.files.length)pF(e.dataTransfer.files[0]);});
function handleUpload(e){if(e.target.files.length)pF(e.target.files[0]);}
function pF(f){const r=new FileReader();r.onload=function(e){try{const wb=XLSX.read(e.target.result,{type:'array'});const ws=wb.Sheets[wb.SheetNames[0]];const j=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});parseUp(j);uz.innerHTML=`<h3>✓ ${f.name} loaded</h3><p>Click to upload a different file</p>`;}catch(err){alert('Error reading file.');console.error(err);}};r.readAsArrayBuffer(f);}
function parseUp(rows){if(rows.length<2)return;const h=rows[0];const ds=[];for(let i=2;i<h.length;i++){let d=h[i];if(d instanceof Date)d=d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});else if(typeof d==='number'){const dt=new Date((d-25569)*86400*1000);d=dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'});}if(d)ds.push(String(d).trim());}DT=ds;D={};let cc='OTHER';for(let r=1;r<rows.length;r++){const row=rows[r];const p=String(row[0]||'').trim().replace(/\*\*/g,'');const ref=String(row[1]||'').trim();if(!p)continue;const empty=ds.every((_,i)=>!row[i+2]||String(row[i+2]).trim()==='');if(!ref&&empty){cc=p;if(!CATS[cc])CATS[cc]='#6366f1';continue;}const pr=pR(ref);const v={};ds.forEach((d,i)=>{let x=row[i+2];x=(x===''||x==='-'||x==null)?null:parseFloat(x);if(isNaN(x))x=null;v[d]=x;});D[p]={cat:cc,unit:'',rt:ref,lo:pr.lo,hi:pr.hi,v};}aC=new Set(Object.keys(CATS).filter(c=>Object.values(D).some(p=>p.cat===c)));aD=new Set(DT);render();}

function render(){rS();rF();rI();rC();rT();rTL();}
function fP(){return Object.entries(D).filter(([_,p])=>aC.has(p.cat));}
function fD(){return DT.filter(d=>aD.has(d));}

function rS(){
const ds=fD(),l=ds[ds.length-1];if(!l){document.getElementById('sCards').innerHTML='';return;}
let ab=0,tot=0;Object.values(D).forEach(p=>{const v=p.v[l];if(v===null)return;tot++;if(st(v,p.lo,p.hi)!=='ok')ab++;});
const hb=D['Hemoglobin']?.v[l],a1=D['HbA1c']?.v[l],ts=D['TSH - Ultra Sensitive']?.v[l];
let h='';
h+=sc(ab>5?'sc':'sw','Abnormal',`${ab}/${tot}`,`Latest: ${l}`);
if(hb!=null)h+=sc(hb<10?'sc':hb<12?'sw':'sg','Hemoglobin',`${hb}`,`Ref: 12.0–15.0 g/dL`);
if(a1!=null)h+=sc(a1>8?'sc':a1>6.5?'sw':'sg','HbA1c',`${a1}%`,`Ref: 4.0–5.6%`);
if(ts!=null)h+=sc(ts>4.78||ts<0.55?'sw':'sg','TSH',`${ts}`,`Ref: 0.55–4.78`);
h+=sc('sn','Test Dates',`${DT.length}`,`${DT[0]} → ${DT[DT.length-1]}`);
document.getElementById('sCards').innerHTML=h;
}
function sc(c,l,v,s){return `<div class="si ${c} fi"><div class="bar"></div><div class="lb">${l}</div><div class="vl">${v}</div><div class="sb">${s}</div></div>`;}

function rF(){
let c='';Object.keys(CATS).forEach(k=>{if(!Object.values(D).some(p=>p.cat===k))return;const sh=k.replace('HEMATOLOGY (CBC)','CBC').replace('INFLAMMATORY MARKERS','Inflammation').replace('VITAMINS & BONE HEALTH','Vitamins').replace(' PROFILE','');c+=`<button class="chip chipc ${aC.has(k)?'on':''}" onclick="tC('${k}')">${sh}</button>`;});
document.getElementById('cChips').innerHTML=c;
let d='';DT.forEach(dt=>d+=`<button class="chip ${aD.has(dt)?'on':''}" onclick="tD('${dt}')">${dt}</button>`);
document.getElementById('dChips').innerHTML=d;
}
function tC(c){aC.has(c)?aC.delete(c):aC.add(c);render();}
function tD(d){aD.has(d)?aD.delete(d):aD.add(d);render();}

function rI(){
const ds=fD(),l=ds[ds.length-1],pv=ds.length>1?ds[ds.length-2]:null;
if(!l){document.getElementById('iGrid').innerHTML='';return;}
const ins=[];
const ts=D['Transferrin Saturation']?.v[l],hb=D['Hemoglobin']?.v[l];
if(ts!=null&&ts<16)ins.push({s:'h',t:'Persistent Iron Deficiency Anemia',p:`Transferrin saturation ${ts}% (ref 16–50%). Hemoglobin ${hb||'—'} g/dL. TIBC elevated. Chronic pattern across all dates — enhanced supplementation may be needed.`});
const gl=D['Fasting Glucose']?.v[l],a1=D['HbA1c']?.v[l];
if(a1&&a1>7){const tr=pv&&D['HbA1c']?.v[pv]?(a1>D['HbA1c'].v[pv]?'worsening':'stable/improving'):'';ins.push({s:a1>8.5?'h':'m',t:'Diabetes — '+(a1>8?'Suboptimal Control':'Moderate'),p:`HbA1c ${a1}% (target <7%), glucose ${gl||'—'} mg/dL. ${tr?'Trend: '+tr+'.':''} Range: 7.2–8.9% across monitoring.`});}
const hdl=D['Cholesterol - HDL']?.v[l];
if(hdl!=null&&hdl<50)ins.push({s:hdl<35?'h':'m',t:'Persistently Low HDL',p:`HDL ${hdl} mg/dL (target ≥50). Range 27–46 across all tests. Increases cardiovascular risk with diabetes.`});
const crp=D['C-Reactive Protein']?.v[l];
if(crp!=null&&crp>3.3)ins.push({s:'m',t:'Chronic Low-Grade Inflammation',p:`CRP ${crp} mg/L (ref 0–3.3). Persistently elevated (4.9–6.3). Related to diabetes/iron deficiency.`});
const ast=D['SGOT (AST)']?.v[l];
if(ast&&ast>34)ins.push({s:'m',t:'AST Elevated',p:`SGOT ${ast} U/L (ref ≤34). Recent spike. ALT at ${D['SGPT (ALT)']?.v[l]||'—'}. Re-evaluate liver function.`});
const tsh=D['TSH - Ultra Sensitive']?.v[l];
if(tsh!=null)ins.push({s:tsh>4.5?'m':'l',t:'Thyroid — TSH '+tsh,p:`Upward trend 2023–2025 (peaked 4.656), latest ${tsh}. T3/T4 in range. Continue monitoring.`});
const b12=D['Vitamin B12']?.v[l];
if(b12!=null)ins.push({s:b12<400?'m':'l',t:'Vitamin B12 Declining',p:`From 1062 (Jan 2022) to ${b12} pg/mL. Still in range but significant decline given anemia.`});
document.getElementById('iGrid').innerHTML=ins.map(i=>`<div class="ins fi"><span class="itag t${i.s}">${i.s==='h'?'Critical':i.s==='m'?'Monitor':'Note'}</span><h4>${i.t}</h4><p>${i.p}</p></div>`).join('');
}

const GR=[
{t:'Hemoglobin & RBC',s:'Anemia markers',p:['Hemoglobin','RBC'],du:1},
{t:'Diabetes Control',s:'Glucose & HbA1c',p:['Fasting Glucose','HbA1c'],du:1},
{t:'Iron Status',s:'Iron & Transferrin Sat.',p:['Iron Serum','Transferrin Saturation'],du:1},
{t:'Thyroid Panel',s:'TSH, T3 & T4',p:['TSH - Ultra Sensitive','T3, Total','T4, Total'],du:0},
{t:'Lipid Panel',s:'Cholesterol & Triglycerides',p:['Cholesterol - Total','Triglycerides','Cholesterol - HDL','Cholesterol - LDL'],du:0},
{t:'Kidney Function',s:'Creatinine & Uric Acid',p:['Creatinine','Uric Acid'],du:0},
{t:'Liver Enzymes',s:'AST, ALT & ALP',p:['SGOT (AST)','SGPT (ALT)','Alkaline Phosphatase'],du:0},
{t:'Inflammatory Markers',s:'ESR & CRP',p:['ESR','C-Reactive Protein'],du:1},
{t:'Vitamins & Bone',s:'D, B12, Calcium',p:['Vitamin D (25-OH)','Vitamin B12','Calcium'],du:0},
{t:'Hematocrit & Indices',s:'HCT, MCV, MCH, MCHC',p:['HCT','MCV','MCH','MCHC'],du:0},
{t:'RDW & Platelets',s:'Cell distribution',p:['RDW-CV','Platelet Count'],du:1},
];

function bCfg(g,ds){
const av=g.p.filter(p=>D[p]&&aC.has(D[p].cat));if(!av.length)return null;
const dsets=av.map((p,i)=>({label:p+(D[p].unit?' ('+D[p].unit+')':''),data:ds.map(d=>D[p].v[d]),borderColor:CL[i%CL.length],backgroundColor:CL[i%CL.length]+'10',fill:i===0,tension:.3,pointRadius:3,pointHoverRadius:6,borderWidth:2,spanGaps:true,yAxisID:g.du&&i>0?'y1':'y'}));
const sc={x:{grid:{color:'#f0f1f4'},ticks:{color:'#9398a8',font:{size:10,family:'Outfit'},maxRotation:45}},y:{position:'left',grid:{color:'#f0f1f4'},ticks:{color:'#5e6378',font:{size:11,family:'Outfit'}}}};
if(g.du&&av.length>1)sc.y1={position:'right',grid:{drawOnChartArea:false},ticks:{color:CL[1],font:{size:11,family:'Outfit'}}};
return{type:'line',data:{labels:ds,datasets:dsets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{position:'top',labels:{color:'#5e6378',font:{size:11,family:'Outfit'},usePointStyle:true,pointStyle:'circle',boxWidth:6,padding:12}},tooltip:{backgroundColor:'#fff',titleColor:'#1a1d26',bodyColor:'#5e6378',borderColor:'#e8e9ed',borderWidth:1,titleFont:{family:'Outfit',size:12,weight:'600'},bodyFont:{family:'Outfit',size:12},padding:10,cornerRadius:8,callbacks:{label:ctx=>{const pN=av[ctx.datasetIndex],p=D[pN],v=ctx.raw;if(v===null)return pN+': N/A';const s=st(v,p.lo,p.hi);return `${pN}: ${v}${p.unit?' '+p.unit:''} ${s==='high'?'▲':s==='low'?'▼':''}  [${p.rt}]`;}}}},scales:sc}};
}

function rC(){
Object.values(ch).forEach(c=>c.destroy());ch={};cStore={};
const ds=fD(),grid=document.getElementById('cGrid');grid.innerHTML='';
if(!ds.length){grid.innerHTML='<p style="color:var(--muted);padding:16px">No dates selected.</p>';return;}
GR.forEach((g,gi)=>{
const av=g.p.filter(p=>D[p]&&aC.has(D[p].cat));if(!av.length)return;
const lD=ds[ds.length-1];const anyA=av.some(p=>{const v=D[p].v[lD];return v!==null&&st(v,D[p].lo,D[p].hi)!=='ok';});
const id='ch'+gi;const cd=document.createElement('div');cd.className='cc fi';
cd.innerHTML=`<div class="ct"><div><h4>${g.t}</h4><div class="cs">${g.s}</div></div><div class="ca"><span class="cb ${anyA?'cba':'cbo'}">${anyA?'Abnormal':'Normal'}</span><button class="mbtn" title="Maximize" onclick="maxC('${id}')">⤢</button></div></div><div class="cw"><canvas id="${id}"></canvas></div>`;
grid.appendChild(cd);
const cfg=bCfg(g,ds);if(cfg){cStore[id]={g,ds};ch[id]=new Chart(document.getElementById(id),cfg);}
});
}

function maxC(id){const s=cStore[id];if(!s)return;const cfg=bCfg(s.g,s.ds);if(!cfg)return;document.getElementById('mTitle').textContent=s.g.t+' — '+s.g.s;document.getElementById('chartModal').classList.add('open');if(mCh)mCh.destroy();mCh=new Chart(document.getElementById('mCanvas'),cfg);}
function closeM(){document.getElementById('chartModal').classList.remove('open');if(mCh){mCh.destroy();mCh=null;}}
document.getElementById('chartModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeM();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

function rT(){
const ps=fP(),ds=fD();document.getElementById('rCnt').textContent=ps.length;document.getElementById('dCnt').textContent=ds.length;
const th=document.querySelector('#dTbl thead'),tb=document.querySelector('#dTbl tbody');
let hh='<tr><th>Parameter</th><th>Ref. Range</th>';ds.forEach(d=>hh+=`<th>${d}</th>`);th.innerHTML=hh+'</tr>';
let bb='',lc='';
ps.forEach(([n,p])=>{
if(p.cat!==lc){lc=p.cat;bb+=`<tr class="cr"><td colspan="${ds.length+2}">${p.cat}</td></tr>`;}
bb+=`<tr><td style="font-weight:500">${n}</td><td style="color:var(--muted);font-size:11px">${p.rt}</td>`;
ds.forEach(d=>{const v=p.v[d];if(v===null){bb+='<td class="vn">—</td>';}else{const s=st(v,p.lo,p.hi);if(tm==='h'){const bg=s==='high'?'rgba(220,38,38,0.08)':s==='low'?'rgba(217,119,6,0.08)':'rgba(22,163,74,0.04)';const cl=s==='high'?'var(--red)':s==='low'?'var(--amber)':'var(--text)';bb+=`<td><span class="hc" style="background:${bg};color:${cl}">${v}</span></td>`;}else{bb+=`<td class="${s==='high'?'vh':s==='low'?'vl':'vo'}">${v}</td>`;}}});
bb+='</tr>';});
tb.innerHTML=bb;
}

function stm(m,el){tm=m;document.querySelectorAll('.tg button').forEach(b=>b.classList.remove('on'));el.classList.add('on');rT();}

function rTL(){
const ds=fD(),el=document.getElementById('tl');
const evs=ds.map(d=>{const ab=[];Object.entries(D).forEach(([n,p])=>{if(!aC.has(p.cat))return;const v=p.v[d];if(v===null)return;const s=st(v,p.lo,p.hi);if(s!=='ok')ab.push({n,v,s});});return{d,ab};});
el.innerHTML=evs.slice().reverse().map(e=>{
const it=e.ab.slice(0,5).map(a=>`<span style="color:${a.s==='high'?'var(--red)':'var(--amber)'}">${a.n}: ${a.v}</span>`);
return `<div class="ti fi"><div class="td">${e.d} — ${e.ab.length} abnormal</div><div class="tb">${it.length?it.join(' · '):'<span style="color:var(--green)">All normal</span>'}</div></div>`;
}).join('');
}

boot();
</script>
</body>
</html>
